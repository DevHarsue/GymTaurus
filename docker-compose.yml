services:
    postgres:
        image: postgres:16
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-taurus}
            POSTGRES_USER: ${POSTGRES_USER:-taurus}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taurus}
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES_USER:-taurus} -d ${POSTGRES_DB:-taurus}',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
        ports:
            - '${POSTGRES_PORT:-5433}:5432'
        networks:
            - backend

    mongo:
        image: mongo:7
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'mongosh --quiet --eval "db.adminCommand(''ping'').ok"',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - mongo_data:/data/db
            - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
        ports:
            - '${MONGO_PORT:-27018}:27017'
        networks:
            - backend

    redis:
        image: redis:7
        restart: unless-stopped
        command: ['redis-server', '--appendonly', 'yes']
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - redis_data:/data
        networks:
            - backend

    mosquitto:
        image: eclipse-mosquitto:2
        restart: unless-stopped
        volumes:
            - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
            - mosquitto_data:/mosquitto/data
            - mosquitto_log:/mosquitto/log
        networks:
            - backend

    auth-service:
        build:
            context: .
            dockerfile: apps/auth-service/Dockerfile
        restart: unless-stopped
        environment:
            AUTH_SERVICE_PORT: 3000
            AUTH_DB_HOST: postgres
            AUTH_DB_PORT: 5432
            AUTH_DB_NAME: ${AUTH_DB_NAME:-taurus}
            AUTH_DB_USER: ${POSTGRES_USER:-taurus}
            AUTH_DB_PASSWORD: ${POSTGRES_PASSWORD:-taurus}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            MQTT_URL: mqtt://mosquitto:1883
            JWT_SECRET: ${JWT_SECRET:-change-me}
            JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
            JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - backend

    members-service:
        build:
            context: .
            dockerfile: apps/members-service/Dockerfile
        restart: unless-stopped
        environment:
            MEMBERS_SERVICE_PORT: 3001
            MEMBERS_DB_HOST: postgres
            MEMBERS_DB_PORT: 5432
            MEMBERS_DB_NAME: ${MEMBERS_DB_NAME:-taurus}
            MEMBERS_DB_USER: ${POSTGRES_USER:-taurus}
            MEMBERS_DB_PASSWORD: ${POSTGRES_PASSWORD:-taurus}
            JWT_SECRET: ${JWT_SECRET:-change-me}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            MQTT_URL: mqtt://mosquitto:1883
            AUTH_SERVICE_BASE_URL: ${AUTH_SERVICE_BASE_URL:-http://auth-service:3000}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - backend

    access-service:
        build:
            context: .
            dockerfile: apps/access-service/Dockerfile
        restart: unless-stopped
        environment:
            ACCESS_SERVICE_PORT: 3002
            ACCESS_MONGO_URI: mongodb://mongo:27017/taurus_access
            MEMBERS_SERVICE_BASE_URL: ${MEMBERS_SERVICE_BASE_URL:-http://members-service:3001}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            MQTT_URL: mqtt://mosquitto:1883
        depends_on:
            mongo:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - backend

    nginx:
        image: nginx:alpine
        restart: unless-stopped
        depends_on:
            - auth-service
            - members-service
            - access-service
        ports:
            - '${NGINX_PORT:-8080}:80'
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        networks:
            - backend

networks:
    backend:
        driver: bridge

volumes:
    postgres_data:
    mongo_data:
    redis_data:
    mosquitto_data:
    mosquitto_log:
